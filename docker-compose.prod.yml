# =============================================================================
# Cloud / managed-infrastructure deployment
# =============================================================================
# Use this compose file when deploying to a host where Postgres and Redis
# are provided externally (e.g., Neon, Upstash, AWS RDS).
#
# All environment variables are pulled from the host or a .env file.
# No database or Redis containers are included.
#
# For local development with bundled Postgres: use docker-compose.yml
# For self-hosted with bundled Postgres + Redis: use docker-compose.self-hosted.yml
# =============================================================================
services:
  app:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
      UPSTASH_REDIS_URL: "${UPSTASH_REDIS_URL}"
      UPSTASH_REDIS_TOKEN: "${UPSTASH_REDIS_TOKEN}"
      UPSTASH_QSTASH_TOKEN: "${UPSTASH_QSTASH_TOKEN}"
      UPSTASH_QSTASH_CURRENT_SIGNING_KEY: "${UPSTASH_QSTASH_CURRENT_SIGNING_KEY}"
      UPSTASH_QSTASH_NEXT_SIGNING_KEY: "${UPSTASH_QSTASH_NEXT_SIGNING_KEY}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      DISABLE_AI_AGENTS: "${DISABLE_AI_AGENTS:-true}"
