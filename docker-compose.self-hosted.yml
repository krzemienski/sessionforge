services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sessionforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sessionforge}
      POSTGRES_DB: ${POSTGRES_DB:-sessionforge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sessionforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_DRIVER: "postgres"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sessionforge}:${POSTGRES_PASSWORD:-sessionforge}@postgres:5432/${POSTGRES_DB:-sessionforge}"

      # Redis (self-hosted local instance)
      REDIS_URL: "redis://redis:6379"

      # Auth
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"

      # OAuth (GitHub)
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"

      # Stripe (optional)
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"

      # AI agents (disabled by default; enable only if you have Claude CLI configured)
      DISABLE_AI_AGENTS: "${DISABLE_AI_AGENTS:-true}"

      # -----------------------------------------------------------------------
      # Optional: QStash configuration (replace self-hosted Redis job queue)
      # Uncomment and fill in the values below if you want to use Upstash QStash
      # instead of the local Redis instance for background job scheduling.
      #
      # UPSTASH_QSTASH_TOKEN: "${UPSTASH_QSTASH_TOKEN}"
      # UPSTASH_QSTASH_CURRENT_SIGNING_KEY: "${UPSTASH_QSTASH_CURRENT_SIGNING_KEY}"
      # UPSTASH_QSTASH_NEXT_SIGNING_KEY: "${UPSTASH_QSTASH_NEXT_SIGNING_KEY}"
      # -----------------------------------------------------------------------
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  redisdata:
